<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun | Aplikasi Sekolah Kita</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <div class="login-container">
        <img src="logo sekolah.png" alt="Logo Sekolah" class="school-logo">
        
        <h2 style="margin-bottom: 20px;"><span>Daftar</span> Akun Baru</h2>
        <p style="font-size: 13px; color: #666; margin-bottom: 25px;">Akun Anda akan diverifikasi oleh Admin sebelum bisa digunakan.</p>

        <form id="registerForm" onsubmit="prosesRegister(event)">
            
            <div class="input-group text-input">
                <input type="text" id="reg-nama" class="input-field" placeholder="Contoh: Budi Santoso, S.Pd" required>
                <label>Nama Lengkap</label>
            </div>

            <div class="input-group text-input">
                <input type="text" id="reg-username" class="input-field" placeholder="contoh: budi_guru" required>
                <label>Username</label>
            </div>

            <div class="input-group text-input">
                <input type="password" id="reg-password" class="input-field" placeholder="Minimal 6 karakter" required minlength="6">
                <label>Password</label>
            </div>

            <div class="input-group">
                <select id="reg-role" class="input-field select-field" required>
                    <option value="" disabled selected>Pilih akses Anda</option>
                    <option value="guru">Guru</option>
                    <option value="admin">Admin</option>
                </select>
                <label>Role / Posisi</label>
            </div>

            <button type="submit" class="login-btn">Daftar Sekarang</button>
        </form>

        <div class="extra-links">
            <p>Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
        </div>
    </div>

    <script>
        function prosesRegister(event) {
            event.preventDefault();

            const nama = document.getElementById('reg-nama').value;
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const role = document.getElementById('reg-role').value;

            // 1. Buat Dummy Email dari Username
            const dummyEmail = username + "@smpn2bk.local"; 

            // 2. Daftarkan ke Firebase Auth
            firebase.auth().createUserWithEmailAndPassword(dummyEmail, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    // 3. Simpan data ke Realtime Database
                    return firebase.database().ref('users/' + user.uid).set({
                        nama: nama,
                        username: username,
                        role: role,
                        status: 'pending' // Menunggu approval Admin
                    });
                })
                .then(() => {
                    alert("Pendaftaran berhasil! Silakan hubungi Admin untuk persetujuan akun Anda.");
                    // Logout otomatis agar tidak langsung masuk
                    firebase.auth().signOut().then(() => {
                        window.location.href = 'login.html';
                    });
                })
                .catch((error) => {
                    // Tangani error (misal: username sudah dipakai karena email sudah terdaftar)
                    if(error.code === 'auth/email-already-in-use') {
                        alert("Gagal: Username sudah digunakan. Silakan pilih username lain.");
                    } else {
                        alert("Gagal mendaftar: " + error.message);
                    }
                });
        }
    </script>
</body>
</html>
