<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Modern | SMPN2BK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <img src="logo sekolah.png" alt="Logo Sekolah" class="school-logo">
        
        <h2><span>Aplikasi Ujian Semi Online</span><br>SMP Negeri 2 Bungku</h2>
        
        <form id="loginForm" onsubmit="prosesLogin(event)">
            
            <div class="input-group text-input">
                <input type="text" id="username" name="username" class="input-field" placeholder="contoh: budi_guru" required>
                <label for="username">Username</label>
            </div>

            <div class="input-group text-input">
                <input type="password" id="password" name="password" class="input-field" placeholder="********" required>
                <label for="password">Password</label>
            </div>

            <div class="input-group">
                <select id="role" name="role" class="input-field select-field" required>
                    <option value="" disabled selected>Pilih akses Anda</option>
                    <option value="admin">Admin</option>
                    <option value="guru">Guru</option>
                </select>
                <label for="role">Role</label>
            </div>

            <button type="submit" class="login-btn">Masuk Sekarang</button>
            
            <div class="extra-links" style="margin-top: 20px; text-align: center; font-size: 14px;">
                <p style="color: #666;">Belum punya akun? 
                    <a href="register.html" style="color: #4a90e2; font-weight: 600; text-decoration: none; transition: all 0.3s;">
                        Daftar Akun Baru
                    </a>
                </p>
            </div>
        </form>

    </div>

    <script>
        function prosesLogin(event) {
            event.preventDefault(); 
            
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const roleSelect = document.getElementById('role').value; // Role yang dipilih di form
            
            // 1. Buat Dummy Email yang sama seperti saat register
            const dummyEmail = usernameInput + "@smpn2bk.local";

            // 2. Proses Login Auth
            firebase.auth().signInWithEmailAndPassword(dummyEmail, passwordInput)
                .then((userCredential) => {
                    const user = userCredential.user;

                    // 3. Cek data user di Realtime Database berdasarkan UID
                    firebase.database().ref('users/' + user.uid).once('value')
                        .then((snapshot) => {
                            if (snapshot.exists()) {
                                const userData = snapshot.val();

                                // 4. Cek apakah status sudah di-approve
                                if (userData.status === 'pending') {
                                    alert("Akun Anda belum disetujui oleh Admin. Silakan tunggu atau hubungi Admin.");
                                    firebase.auth().signOut(); // Logout kembali
                                } 
                                // 5. Cek apakah role yang dipilih sesuai dengan database
                                else if (userData.role !== roleSelect) {
                                    alert("Gagal masuk: Role yang Anda pilih tidak sesuai dengan data akun Anda.");
                                    firebase.auth().signOut();
                                } 
                                // 6. Jika semua lolos, arahkan ke dashboard
                                else {
                                    alert("Login Berhasil!");
                                    if (userData.role === 'admin') {
                                        window.location.href = 'admin_dashboard.html';
                                    } else if (userData.role === 'guru') {
                                        window.location.href = 'guru_dashboard.html';
                                    }
                                }
                            } else {
                                alert("Data pengguna tidak ditemukan di database.");
                                firebase.auth().signOut();
                            }
                        });
                })
                .catch((error) => {
                    alert("Login gagal. Periksa kembali Username dan Password Anda.");
                    console.error("Error Code:", error.code, error.message);
                });
        }
    </script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</body>
</html>
